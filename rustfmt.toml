# Rustfmt configuration for VitaStellar Contracts
# Ensures consistent code formatting across the project

# Formatting style
hard_tabs = false
tab_spaces = 4
newline_style = "Auto"
use_small_heuristics = "Default"

# Imports (stable)
reorder_imports = true

# Code organization
reorder_modules = true

# Function formatting
fn_params_layout = "Tall"

# Control flow
match_block_trailing_comma = true

# Maximum widths
max_width = 100

# Edition-specific
edition = "2021"
